<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vikas | PhD Profile</title>
    <meta
      name="description"
      content="Academic profile website for Vikas, PhD student."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

    <header class="site-header">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-name">Vikas</span>
      </div>
      <nav class="nav-links" aria-label="Primary">
        <a href="#about">About</a>
        <a href="#research">Research</a>
        <a href="#publications">Publications</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
      </nav>
      <button
        type="button"
        id="theme-toggle"
        class="theme-toggle"
        aria-label="Switch to dark mode"
        title="Switch theme"
      >
        <span id="theme-toggle-icon" aria-hidden="true">Dark</span>
      </button>
    </header>

    <main class="container" id="profile-content">
      <noscript>
        JavaScript is required to load profile sections. Please enable JavaScript.
      </noscript>
    </main>

    <footer class="site-footer">
      <p>© <span id="year"></span> Vikas. Built for GitHub Pages.</p>
    </footer>

    <script src="assets/js/main.js"></script>
  </body>
</html>
