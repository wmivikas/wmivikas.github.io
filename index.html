<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vikas | PhD Profile</title>
    <meta
      name="description"
      content="Academic profile website for Vikas, PhD student."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <meta name="color-scheme" content="light dark" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="layout">
      <header class="site-header">
        <div class="brand">
          <span class="brand-name">Vikas Kumar</span>
        </div>
        <nav class="nav-links" aria-label="Primary">
          <a href="#about">About</a>
          <a href="#publications">Publications</a>
          <a href="#highlights">Highlights</a>
          <a href="#research">Research</a>
          <a href="#contact">Contact</a>
        </nav>
        <button
          type="button"
          id="theme-toggle"
          class="theme-toggle"
          aria-label="Switch to dark mode"
          title="Switch theme"
        >
          <span id="theme-toggle-icon" aria-hidden="true">☾</span>
        </button>
      </header>

      <main class="container" id="profile-content">
        <noscript>
          JavaScript is required to load profile sections. Please enable JavaScript.
        </noscript>
      </main>
    </div>

    <footer class="site-footer">
      <p>© <span id="year"></span> Vikas.</p>
    </footer>

    <script src="assets/js/main.js"></script>
  </body>
</html>
