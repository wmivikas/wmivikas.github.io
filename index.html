<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Vikas | PhD Profile</title>
    <meta
      name="description"
      content="Academic profile website for Vikas, PhD student."
    />
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
    <link rel="shortcut icon" href="assets/images/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        const assetVersion = Date.now().toString();
        window.__ASSET_VERSION__ = assetVersion;
        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = `assets/css/style.css?v=${assetVersion}`;
        document.head.appendChild(stylesheet);
      })();
    </script>
  </head>
  <body>
    <div class="layout">
      <header class="site-header">
        <div class="brand">
          <span class="brand-name">Vikas Kumar</span>
        </div>
        <nav class="nav-links" aria-label="Primary">
          <a href="#about">About</a>
          <a href="#highlights">Highlights</a>
          <a href="#publications">Publications</a>
          <a href="#contact">Contact</a>
        </nav>
        <span class="current-section" aria-live="polite">
          Section: <strong id="current-section">About</strong>
        </span>
        <button
          type="button"
          id="theme-toggle"
          class="theme-toggle"
          aria-label="Switch to dark mode"
          title="Switch theme"
        >
          <span id="theme-toggle-icon" aria-hidden="true">☾</span>
        </button>
      </header>

      <main class="container" id="profile-content">
        <noscript>
          JavaScript is required to load profile sections. Please enable JavaScript.
        </noscript>
      </main>
    </div>

    <footer class="site-footer">
      <p>
        © <span id="year"></span> <span id="footer-owner">Vikas</span>.
        <span id="footer-last-updated" class="footer-version" hidden></span>
        <span id="footer-local-clock" class="footer-version" hidden></span>
        <span id="footer-template-version" class="footer-version" hidden></span>
      </p>
    </footer>

    <script>
      (function () {
        const assetVersion = window.__ASSET_VERSION__ || Date.now().toString();
        const mainScript = document.createElement("script");
        mainScript.src = `assets/js/main.js?v=${assetVersion}`;
        document.body.appendChild(mainScript);
      })();
    </script>
  </body>
</html>
